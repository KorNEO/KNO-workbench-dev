<!DOCTYPE html>
<html lang="ko">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <style>
    :root {
      --brand:#3f51b5; --brand-d:#2c3a8c; --ink:#1f2330; --muted:#7a8194; --line:#e6e8ef; --bg:#f5f6fa;
      --sineo:#1b9e5a; --sineo-bg:#e7f6ee; --bisineo:#d8453b; --bisineo-bg:#fdeceb;
      --hold:#e0921a; --hold-bg:#fff4e2; --reject:#6b7280; --reject-bg:#eef0f3;
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Pretendard","Malgun Gothic","맑은 고딕",system-ui,sans-serif; color:var(--ink); background:var(--bg); font-size:14px; }
    a { color:var(--brand); }
    .hidden { display:none !important; }
    header { display:flex; align-items:center; gap:16px; padding:0 18px; height:54px; background:linear-gradient(90deg,var(--brand),var(--brand-d)); color:#fff; box-shadow:0 1px 6px rgba(0,0,0,.15); position:sticky; top:0; z-index:50; }
    .brand { font-weight:700; font-size:18px; cursor:pointer; }
    .brand b { font-weight:800; }
    .modebadge { font-size:12px; background:rgba(255,255,255,.2); padding:3px 10px; border-radius:10px; }
    nav.tabs { display:flex; gap:4px; }
    nav.tabs button { background:transparent; border:none; color:#dfe3ff; padding:8px 14px; border-radius:8px; font-size:14px; cursor:pointer; }
    nav.tabs button:hover { background:rgba(255,255,255,.12); color:#fff; }
    nav.tabs button.active { background:#fff; color:var(--brand-d); font-weight:700; }
    .spacer { flex:1; }
    .who { font-size:13px; color:#e8ebff; }
    .who .role { background:rgba(255,255,255,.2); padding:2px 8px; border-radius:10px; margin-left:6px; }
    .guide-btn { background:rgba(255,255,255,.16); border:1px solid rgba(255,255,255,.4); color:#fff; padding:6px 12px; border-radius:8px; cursor:pointer; }
    .guide-btn:hover { background:rgba(255,255,255,.28); }
    main { padding:18px; }
    .home-wrap { max-width:920px; margin:0 auto; }
    .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:18px 20px; box-shadow:0 1px 3px rgba(20,30,60,.05); margin-bottom:16px; }
    .card h2 { margin:0 0 14px; font-size:17px; }
    .bar { display:flex; height:22px; border-radius:7px; overflow:hidden; background:#eef0f5; }
    .bar > span { display:block; height:100%; }
    .seg-done { background:var(--sineo); } .seg-first { background:#7c8cf0; }
    .legend { display:flex; gap:16px; margin-top:10px; font-size:12px; color:var(--muted); flex-wrap:wrap; }
    .legend i { display:inline-block; width:11px; height:11px; border-radius:3px; margin-right:5px; vertical-align:-1px; }
    .big-num { font-size:30px; font-weight:800; } .big-num small { font-size:14px; font-weight:500; color:var(--muted); }
    table.grp { width:100%; border-collapse:collapse; }
    table.grp th, table.grp td { text-align:left; padding:9px 8px; border-bottom:1px solid var(--line); font-size:13px; white-space:nowrap; }
    #researcher-list, #second-body { overflow-x:auto; }
    table.grp th { color:var(--muted); font-weight:600; }
    .minibar { width:160px; }
    .stat-line { display:flex; justify-content:space-between; align-items:center; padding:9px 2px; border-bottom:1px solid var(--line); }
    .stat-line:last-child { border-bottom:none; } .stat-line .lbl { color:var(--muted); } .stat-line .val { font-weight:800; font-size:16px; }
    .stat-line .val.go { color:var(--brand); cursor:pointer; text-decoration:underline; }
    .work-wrap { display:grid; grid-template-columns:330px 1fr; gap:16px; align-items:start; }
    .list-col { background:#fff; border:1px solid var(--line); border-radius:14px; padding:12px; max-height:calc(100vh - 100px); overflow:auto; position:sticky; top:72px; }
    .filters { display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; }
    .filters input, .filters select { padding:6px 8px; border:1px solid var(--line); border-radius:8px; font-size:13px; }
    .filters input { flex:1; min-width:110px; }
    .item { padding:9px 11px; border:1px solid var(--line); border-radius:10px; margin-bottom:6px; cursor:pointer; }
    .item:hover { border-color:#bcc4f0; background:#f7f8ff; }
    .item.sel { border-color:var(--brand); background:#eef1ff; box-shadow:0 0 0 2px rgba(63,81,181,.12); }
    .item .cand { font-weight:700; font-size:15px; display:flex; align-items:center; justify-content:space-between; gap:10px; } .item .cand .nm { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; } .item .meta { color:var(--muted); font-size:12px; margin-top:2px; }
    .pill { font-size:11px; padding:1px 8px; border-radius:10px; font-weight:600; white-space:nowrap; flex:none; }
    .pill.미작업 { background:#eef0f3; color:#6b7280; }
    .pill.s1 { background:#e7ebff; color:#3f51b5; } .pill.s2 { background:var(--sineo-bg); color:var(--sineo); } .pill.sr { background:var(--hold-bg); color:var(--hold); }
    .detail-col { background:#fff; border:1px solid var(--line); border-radius:14px; padding:22px 26px; min-height:300px; }
    .placeholder { color:var(--muted); text-align:center; padding:60px 0; }
    .cand-label { color:var(--muted); font-size:12px; font-weight:700; letter-spacing:.5px; }
    .cand-term { font-size:30px; font-weight:800; margin:2px 0 6px; }
    .cand-meta { color:#4a5168; font-size:14px; margin-bottom:18px; } .cand-meta b { color:var(--ink); }
    .llm-hint { display:inline-block; font-size:12px; color:var(--muted); background:#f1f3f9; padding:3px 10px; border-radius:8px; margin-bottom:8px; } .llm-hint b { color:var(--brand-d); }
    /* 집필(M5) */
    .llm-box { background:#f6f8ff; border:1px solid #e0e6ff; border-radius:10px; padding:12px 14px; margin:14px 0; }
    .llm-box h3 { margin:0 0 8px; font-size:13px; color:var(--brand-d); }
    .llm-box .row { display:flex; gap:10px; padding:4px 0; font-size:13px; } .llm-box .k { color:var(--muted); min-width:64px; } .llm-box .v { color:var(--ink); flex:1; white-space:pre-wrap; }
    .diff-box { border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin:14px 0; }
    .diff-box h3 { margin:0 0 8px; font-size:13px; }
    .drow { display:flex; gap:10px; padding:5px 0; border-top:1px solid var(--line); font-size:14px; } .drow:first-of-type { border-top:none; }
    .drow .dl { min-width:56px; color:var(--muted); font-weight:700; font-size:12px; padding-top:2px; } .drow .dv { flex:1; white-space:pre-wrap; line-height:1.55; }
    .diff-box mark { border-radius:3px; padding:0 2px; }
    .diff-box mark.m1 { background:#ffdada; color:#a12b2b; }
    .diff-box mark.m2 { background:#d6e4ff; color:#1f4fa3; }
    .write-form { display:grid; grid-template-columns:1fr 1fr; gap:12px 16px; margin-top:16px; }
    .wf { display:flex; flex-direction:column; gap:4px; } .wf label { font-size:12px; font-weight:700; color:var(--muted); }
    .wf:has(textarea) { grid-column:1 / -1; }
    .w-field { width:100%; padding:7px 9px; border:1px solid var(--line); border-radius:8px; font-family:inherit; font-size:13px; box-sizing:border-box; }
    .w-field:focus { outline:none; border-color:var(--brand); }
    textarea.w-field { resize:vertical; }
    .wf-sec { grid-column:1 / -1; font-weight:800; color:var(--brand-d); margin-top:8px; border-top:1px dashed var(--line); padding-top:12px; }
    .write-cols { display:grid; grid-template-columns:1fr 1fr; gap:16px; align-items:stretch; margin:14px 0; }
    @media (max-width:900px){ .write-cols { grid-template-columns:1fr; } }
    .stage-sec { border:1px solid var(--line); border-radius:12px; padding:14px 16px; display:flex; flex-direction:column; }
    .stage-sec .write-form { grid-template-columns:1fr; margin-top:10px; }
    .ss-foot { margin-top:auto; padding-top:12px; }
    .stage-sec.s1 { background:#fff5f5; border-left:4px solid #f0a3a3; }
    .stage-sec.s2 { background:#f4f8ff; border-left:4px solid #a3c0f0; }
    .ss-head { font-weight:800; font-size:15px; margin-bottom:6px; } .ss-head .ss-who { font-weight:600; font-size:12px; color:var(--muted); margin-left:8px; }
    .w-field.changed { background:#dbe9ff; border-color:#6f9bf0; }
    .prior { background:#f7f8ff; border:1px solid #e2e6fb; border-radius:10px; padding:10px 12px; font-size:13px; margin-bottom:12px; } .prior .lab { color:var(--brand-d); font-weight:700; }
    .stages.two { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .stage-panel { border:1px solid var(--line); border-radius:12px; padding:14px 16px; background:#fcfcff; margin-top:10px; }
    .stage-panel.stage-worker { border-top:3px solid #7c8cf0; } .stage-panel.stage-reviewer { border-top:3px solid var(--sineo); }
    .sp-head { font-weight:800; font-size:14px; margin-bottom:10px; }
    .verdicts { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:6px 0 4px; }
    .vcard { border:2px solid var(--line); border-radius:14px; padding:18px 10px; text-align:center; cursor:pointer; user-select:none; transition:.12s; background:#fff; }
    .vcard .vk { font-size:11px; color:var(--muted); } .vcard .vt { font-size:20px; font-weight:800; margin-top:4px; }
    .vcard:hover { transform:translateY(-1px); }
    .verdicts.ro .vcard { pointer-events:none; } .verdicts.ro .vk { visibility:hidden; }
    .vcard[data-v="신어"]:hover { border-color:var(--sineo); } .vcard[data-v="비신어"]:hover { border-color:var(--bisineo); } .vcard[data-v="판단 보류"]:hover { border-color:var(--hold); }
    .vcard.on[data-v="신어"] { background:var(--sineo-bg); border-color:var(--sineo); color:var(--sineo); }
    .vcard.on[data-v="비신어"] { background:var(--bisineo-bg); border-color:var(--bisineo); color:var(--bisineo); }
    .vcard.on[data-v="판단 보류"] { background:var(--hold-bg); border-color:var(--hold); color:var(--hold); }
    .memo-wrap { margin:14px 0 6px; } .memo-wrap label { font-size:12px; font-weight:700; color:var(--muted); display:block; margin-bottom:4px; }
    .memo-wrap textarea { width:100%; min-height:60px; border:1.5px solid var(--line); border-radius:10px; padding:10px 12px; font-family:inherit; font-size:14px; resize:vertical; }
    .memo-wrap textarea:focus { outline:none; border-color:var(--brand); box-shadow:0 0 0 3px rgba(63,81,181,.12); }
    .actions { display:flex; gap:10px; align-items:center; margin-top:10px; flex-wrap:wrap; }
    .btn { padding:10px 20px; border-radius:10px; border:none; cursor:pointer; font-size:14px; font-weight:700; }
    .btn.save { background:var(--brand); color:#fff; } .btn.save:hover { background:var(--brand-d); }
    .btn.reject { background:#fff; color:var(--reject); border:1.5px solid #cfd4dd; } .btn.reject:hover { background:var(--reject-bg); }
    .kbd { font-size:11px; color:var(--muted); } .kbd b { background:#eef0f5; border-radius:4px; padding:1px 5px; font-family:monospace; }
    .saved-meta { font-size:12px; color:var(--muted); margin-left:auto; }
    .example { margin-top:22px; } .example h3 { font-size:14px; margin:0 0 8px; }
    .ex-box { background:#fcfcfe; border:1px solid var(--line); border-left:4px solid var(--brand); border-radius:10px; padding:14px 16px; line-height:1.75; font-size:15px; white-space:pre-wrap; word-break:break-word; max-height:260px; overflow:auto; }
    .ex-box mark { background:#fff2a8; color:#7a5a00; font-weight:800; padding:0 2px; border-radius:3px; }
    .ex-foot { display:flex; gap:18px; flex-wrap:wrap; margin-top:8px; font-size:13px; color:var(--muted); } .ex-foot a { font-weight:600; }
    .llm-detail { margin-top:22px; border-top:1px dashed var(--line); padding-top:14px; } .llm-detail summary { cursor:pointer; color:var(--muted); font-size:13px; font-weight:700; }
    .llm-detail .row { margin-top:8px; } .llm-detail .row .k { font-size:12px; color:var(--muted); font-weight:700; } .llm-detail .row .v { white-space:pre-wrap; background:#fafbfd; border:1px solid var(--line); border-radius:8px; padding:8px 10px; margin-top:3px; }
    .login-hero { max-width:760px; margin:48px auto; text-align:center; }
    .login-hero .logo { font-size:36px; font-weight:800; color:var(--brand-d); }
    .login-hero .sub { color:var(--muted); margin:6px 0 26px; }
    .gsi { display:inline-flex; align-items:center; gap:12px; background:#fff; color:#3c4043; border:1px solid #dadce0; border-radius:10px; padding:13px 24px; font-size:15px; font-weight:600; cursor:pointer; box-shadow:0 1px 2px rgba(60,64,67,.1); text-decoration:none; }
    .gsi:hover { background:#f8faff; border-color:#c6d2f5; box-shadow:0 1px 6px rgba(60,64,67,.18); }
    .gsi svg { width:20px; height:20px; display:block; }
    .login-current { margin-top:10px; color:var(--muted); font-size:13px; } .login-current b { color:var(--ink); }
    .login-warn { color:var(--bisineo); background:var(--bisineo-bg); border-radius:10px; padding:10px 14px; margin:14px auto 0; max-width:460px; }
    .modes { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; margin-top:30px; }
    .mode-card { background:#fff; border:1.5px solid var(--line); border-radius:16px; padding:28px 16px; cursor:pointer; transition:.12s; }
    .mode-card.active:hover { border-color:var(--brand); transform:translateY(-2px); box-shadow:0 8px 22px rgba(63,81,181,.16); }
    .mode-card.disabled { opacity:.55; cursor:not-allowed; }
    .mode-card .mc-ico { font-size:34px; } .mode-card .mc-t { font-size:18px; font-weight:800; margin-top:8px; }
    .mode-card .mc-sub { color:var(--muted); font-size:12px; margin-top:4px; }
    .mode-card .mc-badge { display:inline-block; font-size:11px; background:var(--hold-bg); color:var(--hold); padding:2px 8px; border-radius:8px; margin-top:10px; }
    .modal { position:fixed; inset:0; background:rgba(20,24,40,.45); display:flex; align-items:center; justify-content:center; z-index:100; }
    .modal-box { background:#fff; width:min(680px,92vw); max-height:84vh; overflow:auto; border-radius:14px; padding:24px 28px; box-shadow:0 12px 40px rgba(0,0,0,.3); }
    .modal-box .x { float:right; border:none; background:#eef0f5; border-radius:8px; width:30px; height:30px; cursor:pointer; font-size:16px; }
    .guide-md h1 { font-size:20px; margin:18px 0 8px; } .guide-md h1:first-child { margin-top:0; }
    .guide-md h2 { font-size:17px; margin:22px 0 8px; padding-bottom:5px; border-bottom:1px solid var(--line); }
    .guide-md h3 { font-size:15px; margin:16px 0 6px; } .guide-md h4 { font-size:14px; margin:12px 0 4px; color:var(--brand-d); }
    .guide-md p { margin:7px 0; line-height:1.75; } .guide-md ul { margin:6px 0 12px 20px; } .guide-md li { margin:4px 0; line-height:1.65; }
    .guide-md blockquote { margin:10px 0; padding:8px 14px; background:#f7f8fb; border-left:3px solid #c6d0f5; border-radius:6px; }
    .guide-md blockquote p { margin:3px 0; font-size:13px; color:#4a5168; }
    .guide-md hr { border:none; border-top:1px solid var(--line); margin:18px 0; }
    .guide-md table.gtbl { border-collapse:collapse; margin:12px 0; font-size:13px; width:100%; }
    .guide-md .gtbl th, .guide-md .gtbl td { border:1px solid var(--line); padding:6px 9px; text-align:left; vertical-align:top; }
    .guide-md .gtbl th { background:#eef1f9; font-weight:700; }
    .guide-md .gtbl tr:nth-child(even) td { background:#fafbfe; }
    .guide-box { width:min(940px,95vw); }
    .guide-wrap { display:flex; gap:16px; }
    .guide-toc { flex:none; width:190px; max-height:64vh; overflow:auto; border-right:1px solid var(--line); padding-right:10px; }
    .guide-toc a { display:block; padding:4px 6px; font-size:13px; color:var(--muted); text-decoration:none; border-radius:6px; line-height:1.4; }
    .guide-toc a:hover { background:#f2f4fa; color:var(--brand); }
    .guide-toc a.lv2 { padding-left:16px; font-size:12px; } .guide-toc a.lv3 { padding-left:28px; font-size:12px; }
    .guide-body { flex:1; max-height:64vh; overflow:auto; padding-right:6px; }
    @media(max-width:640px){ .guide-wrap{ flex-direction:column; } .guide-toc{ width:auto; max-height:130px; border-right:none; border-bottom:1px solid var(--line); padding-right:0; } .guide-body{ max-height:52vh; } }
    .login-ov { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:300; }
    .login-box { width:min(380px,92vw); background:#fff; border:1px solid var(--line); border-radius:16px; padding:30px 28px; box-shadow:0 8px 30px rgba(20,30,60,.1); }
    .login-logo { font-size:26px; font-weight:800; color:var(--brand-d); text-align:center; }
    .login-sub { color:var(--muted); text-align:center; font-size:13px; margin:4px 0 18px; }
    .login-tabs { display:flex; gap:6px; margin-bottom:16px; }
    .login-tabs button { flex:1; padding:8px; border:1px solid var(--line); background:#f7f8fa; border-radius:8px; cursor:pointer; font-weight:700; color:var(--muted); }
    .login-tabs button.on { background:var(--brand); color:#fff; border-color:var(--brand); }
    .login-box input:not([type=checkbox]) { width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:8px; margin-bottom:8px; font-size:14px; }
    .login-btn { width:100%; padding:11px; border:none; border-radius:8px; background:var(--brand); color:#fff; font-weight:700; cursor:pointer; font-size:14px; margin-top:4px; }
    .login-btn:hover { background:var(--brand-d); } .login-btn.ghost { background:#eef0f5; color:var(--brand-d); }
    .rmb { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--muted); margin:2px 0 10px; cursor:pointer; }
    .rmb input { width:auto; margin:0; }
    .login-msg { font-size:12px; color:var(--bisineo); margin-top:8px; min-height:16px; }
    #toast { position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:#222a3d; color:#fff; padding:10px 18px; border-radius:10px; display:none; z-index:200; box-shadow:0 4px 16px rgba(0,0,0,.3); }
    /* 접속 현황 — 캠퍼스별 명단(접속 중/오프라인) */
    .presence-head { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
    .presence-head .live-dot { width:10px; height:10px; border-radius:50%; background:var(--sineo); animation:pulse 2s infinite; flex:none; }
    @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(27,158,90,.45);} 70%{box-shadow:0 0 0 9px rgba(27,158,90,0);} 100%{box-shadow:0 0 0 0 rgba(27,158,90,0);} }
    .presence-head .p-count { font-size:15px; color:var(--ink); } .presence-head .p-count b { color:var(--sineo); font-weight:800; }
    .zones { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
    @media(max-width:640px){ .zones{ grid-template-columns:1fr; } }
    .zone { background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px 14px 8px; }
    .zone-h { font-size:14px; font-weight:800; color:var(--brand-d); padding-bottom:9px; margin-bottom:4px; border-bottom:1px solid var(--line); }
    .prow { display:flex; align-items:center; gap:9px; padding:7px 2px; }
    .prow .dot { width:9px; height:9px; border-radius:50%; flex:none; }
    .prow.on .dot { background:var(--sineo); box-shadow:0 0 0 3px rgba(27,158,90,.16); }
    .prow.off .dot { background:#cdd2dc; }
    .prow .pnm { font-weight:600; color:var(--ink); }
    .prow.off .pnm { color:var(--muted); font-weight:500; }
    .prow .pst { margin-left:auto; font-size:12px; }
    .prow.on .pst { color:var(--sineo); font-weight:700; }
    .prow.off .pst { color:var(--muted); }
    /* 프로젝트 목록 */
    .proj-head { display:flex; align-items:center; gap:12px; margin-bottom:16px; } .proj-head h2 { margin:0; flex:1; font-size:19px; }
    .proj-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:14px; }
    .proj-card { position:relative; background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px 18px; cursor:pointer; transition:.12s; }
    .proj-bak { position:absolute; top:8px; right:8px; border:none; background:#eef0f5; color:var(--muted); width:26px; height:24px; border-radius:7px; cursor:pointer; font-size:13px; line-height:1; }
    .proj-bak:hover { background:#e2e6fb; color:var(--brand); }
    .proj-del { position:absolute; top:8px; right:40px; border:none; background:#eef0f5; color:var(--muted); width:24px; height:24px; border-radius:7px; cursor:pointer; font-size:16px; line-height:1; }
    .proj-del:hover { background:var(--bisineo-bg); color:var(--bisineo); }
    .proj-card .pc-name { padding-right:74px; }
    .proj-card:hover { border-color:var(--brand); box-shadow:0 6px 18px rgba(63,81,181,.12); transform:translateY(-1px); }

  <div id="toast"></div>

  <script>
    var API_URL = 'https://script.google.com/macros/s/AKfycbyJfYPkTM6YRaqUHtvrIKxaf6ObSmb6KiGSFTiMOGCRlAkideVoX-32iet9PmWuBLw8/exec';
    function apiCall_(fn, args){
      return fetch(API_URL, { method:'POST', body: JSON.stringify({fn:fn, args:args||[]}) })
        .then(function(r){ return r.json(); })
        .then(function(j){ if(!j.ok) throw new Error(j.error||'서버 오류'); return j.data; });
    }
    // google.script.run 호환 셰임 — 기존 호출부 그대로, 실제로는 fetch→doPost(GitHub Pages 프론트용)
    window.google = { script: { run: {} } };
    Object.defineProperty(window.google.script, 'run', { get: function(){
      var s=null, f=null;
      var proxy = new Proxy({}, { get: function(t, prop){
        if(prop==='withSuccessHandler') return function(fn){ s=fn; return proxy; };
        if(prop==='withFailureHandler') return function(fn){ f=fn; return proxy; };
        return function(){ apiCall_(prop, [].slice.call(arguments)).then(function(d){ if(s)s(d); }).catch(function(e){ if(f)f({message:(e&&e.message)||String(e)}); }); return proxy; };
      }});
      return proxy;
    }});
    var TOKEN = (new URLSearchParams(location.search)).get('u') || '';
    var ME = { email:'', name:'', role:'', isManager:false };
    var VERDICTS = ['신어','비신어','판단 보류'];
    var MODE = 'real';                 // 'real' | 'agree'
    var ITEMS = [], CUR = -1, SCOPE = 'landing';
    var DIRTY = false, AUTO_TIMER = null, APP_URL = '';

    function $(id){ return document.getElementById(id); }
    function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function toast(m){ var t=$('toast'); t.textContent=m; t.style.display='block'; clearTimeout(t._t); t._t=setTimeout(function(){t.style.display='none';},2400); }
    // 진단: 잡히지 않은 오류를 화면에 노출(F12 없이 원인 파악). 길게 보이게 5초.
    function _diagToast(m){ var t=$('toast'); if(!t) return; t.textContent=m; t.style.display='block'; clearTimeout(t._t); t._t=setTimeout(function(){t.style.display='none';},6000); }
    window.addEventListener('error', function(ev){ try{ _diagToast('JS오류: '+(ev.message||'')+' @'+((ev.filename||'').split('/').pop())+':'+ev.lineno); }catch(e){} });
    window.addEventListener('unhandledrejection', function(ev){ try{ _diagToast('비동기오류: '+((ev.reason&&ev.reason.message)||ev.reason||'')); }catch(e){} });
    function modeKind(){ return MODE==='agree' ? '일치도' : MODE==='write' ? '집필' : '실제'; }
    function srcLabel(s){ return s==='NN'?'〈네이버 뉴스 말뭉치〉':s==='YT'?'〈유튜브 말뭉치〉':s==='공통'?'〈네이버 뉴스 말뭉치〉·〈유튜브 말뭉치〉':esc(s); }
    function ym(v){ v=String(v||''); return v.length>=6 ? v.slice(0,4)+'.'+v.slice(4,6) : esc(v); }
    function ymd(v){ function p(n){return n<10?'0'+n:n;} var s=String(v||''); var m=s.match(/(\d{4})-(\d{2})-(\d{2})/); if(m) return m[1]+'.'+m[2]+'.'+m[3]+'.'; var d=new Date(s); return isNaN(d.getTime())?esc(s):d.getFullYear()+'.'+p(d.getMonth()+1)+'.'+p(d.getDate())+'.'; }
    function statusLabel(s){ return s==='1차완료'?'1차 작업 완료':s==='2차완료'?'2차 검수 완료':(s||'미작업'); }
    function pillClass(s){ return s==='1차완료'?'s1':s==='2차완료'?'s2':'미작업'; }
    function reEscape(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
    function highlight(text, cand){
      text=String(text||''); cand=String(cand||'').replace(/\s+/g,'');
      if(!cand) return esc(text);
      var re; try{ re=new RegExp(cand.split('').map(reEscape).join('\\s*'),'gi'); }catch(e){ return esc(text); }
      var out='', last=0, m;
      while((m=re.exec(text))!==null){ out+=esc(text.slice(last,m.index))+'<mark>'+esc(m[0])+'</mark>'; last=m.index+m[0].length; if(m[0].length===0)re.lastIndex++; }
      return out+esc(text.slice(last));
    }
    function openWin(u){ window.open(u, '_blank', 'noopener,width=1100,height=850,left=120,top=80'); return false; }
    function link(url,label){ url=String(url||'').trim(); return url? '<a href="'+esc(url)+'" target="_blank" rel="noopener" onclick="return openWin(this.href)">'+label+'</a>' : '<span style="color:#bbb">'+label+' 없음</span>'; }

    /* 라우팅 */
    function showView(v){
      if((v==='home'||v==='mine'||v==='all') && !CURRENT_PROJECT) v='projects';   // 프로젝트 선택 필수
      SCOPE=v;
      var onLanding=(v==='landing');
      $('nav').style.display = onLanding ? 'none':'';
      $('who').style.display = onLanding ? 'none':'';
      $('guideBtn').style.display = onLanding ? 'none':'';
      $('guideBtnWrite').style.display = onLanding ? 'none':'';
      $('modeBadge').classList.toggle('hidden', onLanding);
      if(v==='projects') $('modeBadge').textContent = modeName();
      document.querySelectorAll('nav.tabs button').forEach(function(b){ b.classList.toggle('active', b.getAttribute('data-view')===v); });
      var hasProj=!!CURRENT_PROJECT;   // 프로젝트 미선택 시 작업 탭 숨김
      ['home','mine'].forEach(function(dv){ var b=document.querySelector('nav.tabs button[data-view="'+dv+'"]'); if(b) b.style.display=hasProj?'':'none'; });
      $('tab-all').style.display = (hasProj && MODE!=='agree') ? '' : 'none';
      if(onLanding){ loadPresence(); }
      $('view-landing').classList.toggle('hidden', v!=='landing');
      $('view-projects').classList.toggle('hidden', v!=='projects');
      $('view-home').classList.toggle('hidden', v!=='home');
      $('view-work').classList.toggle('hidden', v!=='mine' && v!=='all');
      $('btn-add-item').style.display=((v==='mine'||v==='all') && MODE==='write')?'block':'none';
      $('view-researchers').classList.toggle('hidden', v!=='researchers');
      if(v==='projects') renderProjects();
      else if(v==='home'){ loadProgress(); loadAssign(); }
      else if(v==='mine' || v==='all'){ $('f-status').value=''; $('f-q').value=''; var _wl=window.__weekList||[]; $('f-week').innerHTML='<option value="">전체 주차</option>'+_wl.map(function(w){return '<option value="'+esc(w)+'">'+esc(w)+'주차</option>';}).join(''); $('f-week').style.display=(MODE==='real')?'':'none'; populateAssignees(v); loadItems(); }
      else if(v==='researchers') loadResearchers();
    }
    var CURRENT_PROJECT = null, PROJ_LIST = [];
    function modeName(){ return MODE==='agree' ? '🤝 연구자 일치도 작업' : MODE==='write' ? '✍️ 신어 집필 작업' : '🧭 신어 판별 작업'; }
    function enterMode(mode){ MODE=mode; CURRENT_PROJECT=null; showView('projects'); }

    /* 프로젝트 목록 / 새 프로젝트(CSV 업로드) */
    function renderProjects(){
      $('proj-title').textContent = (MODE==='agree'?'연구자 일치도 작업':MODE==='write'?'신어 집필 작업':'신어 판별 작업');
      $('proj-new-btn').style.display = ME.isManager ? '' : 'none';
      $('proj-list').innerHTML='<span class="kbd">불러오는 중…</span>';
      google.script.run.withSuccessHandler(function(list){ PROJ_LIST=list||[];
        $('proj-list').innerHTML = PROJ_LIST.length ? PROJ_LIST.map(function(p){
          return '<div class="proj-card" onclick="openProject(\''+esc(p.id)+'\')">'
            + (ME.isManager
                ? '<button class="proj-bak" onclick="event.stopPropagation();backupProject(\''+esc(p.id)+'\')" title="저장">📥</button>'
                  + '<button class="proj-del" onclick="event.stopPropagation();deleteProject(\''+esc(p.id)+'\')" title="삭제">×</button>'
                : '')
            + '<div class="pc-name">'+esc(p.name)+'</div>'
            + '<div class="pc-meta">업로드 <b>'+esc(p.uploaded||'-')+'</b></div>'
            + '<span class="pc-status '+esc(p.status||'')+'">'+esc(p.status||'')+'</span></div>';
        }).join('') : '<span class="kbd">프로젝트가 없습니다.'+(ME.isManager?' 우측 위 <b>+ 새 프로젝트</b>로 만드세요.':'')+'</span>';
      }).withFailureHandler(function(e){ $('proj-list').innerHTML='<span class="kbd">실패: '+esc(e.message)+'</span>'; }).getProjects(TOKEN, modeKind());
    }
    function backupProject(id){
      var p=null; for(var i=0;i<PROJ_LIST.length;i++) if(PROJ_LIST[i].id===id){ p=PROJ_LIST[i]; break; }
      var nm=(p&&p.name)||'프로젝트';
      google.script.run.withSuccessHandler(function(csv){ dlCsv(csv, nm+'_백업.csv'); }).withFailureHandler(function(e){ toast('백업 실패: '+e.message); }).exportProject(TOKEN, modeKind(), id);

    /* 무손실 저장 큐: 화면은 즉시 넘어가되 저장은 영속 큐로 직렬 처리. 실패 시 자동 재시도(백오프),
       localStorage에 보존(탭 닫거나 새로고침해도 안 날아감), 미저장 있으면 이탈 경고. 토큰별로 분리 보관. */
    var PENDING = [], FLUSHING = false;
    function newOpId(){ return (TOKEN||'')+'-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,8); }  // 저장 1회당 고유 — 재시도는 같은 op_id 재사용(서버 멱등)
    function pendingKey(){ return 'kno_pending_' + (TOKEN||''); }
    function loadPending(){ try{ PENDING = JSON.parse(localStorage.getItem(pendingKey())||'[]')||[]; }catch(e){ PENDING=[]; } }
    function persistPending(){ try{ localStorage.setItem(pendingKey(), JSON.stringify(PENDING)); }catch(e){} }
    function updateSaveBadge(){
      if(PENDING.length) setSaveBadge('자동 저장 중…', false);
      else setSaveBadge('저장 완료', false);
    }
    function enqueueSave(fn, payload){
      for(var i=0;i<PENDING.length;i++){ if(PENDING[i].fn===fn && PENDING[i].payload.row_id===payload.row_id){ PENDING.splice(i,1); break; } }  // 같은 항목·단계는 최신값으로 대체
      PENDING.push({ fn:fn, payload:payload, tries:0 });
      persistPending(); updateSaveBadge(); flushPending();
    }
    function doneJob_(job){
      var i=PENDING.indexOf(job); if(i>=0) PENDING.splice(i,1); persistPending();
      FLUSHING=false; updateSaveBadge(); flushPending();
    }
    // 저장 응답을 못 읽는 환경(웨일 등)에서도 행을 다시 읽어 판정. 3가지:
    //  landed=값 반영됨(성공) / notLanded=행은 읽혔는데 값 없음(확정 실패) / unknown=행 조회도 실패(확인 불가).
    function verifyJob_(job, onLanded, onNotLanded, onUnknown){
      google.script.run.withSuccessHandler(function(it){
        var ok=false;
        if(job.fn==='saveFirst') ok=(String((it||{})['1차 판별']||'').trim()===String(job.payload.verdict).trim());
        else if(job.fn==='saveSecond') ok=(String((it||{})['2차 판별']||'').trim()===String(job.payload.verdict).trim());
        ok?onLanded():onNotLanded();
      }).withFailureHandler(function(){ onUnknown(); }).getItem(TOKEN, job.payload.row_id);
    }
    function dropJob_(job){ var i=PENDING.indexOf(job); if(i>=0) PENDING.splice(i,1); persistPending(); FLUSHING=false; flushPending(); }
    // 확정 실패: 서버 저장실패로그에 1회 기록 + 사용자에게 알리고 큐에서 제거(다음 항목 진행).
    function reportFail_(job, reason){
      if(!job.logged){ job.logged=true;
        google.script.run.withSuccessHandler(function(){}).withFailureHandler(function(){})
          .logClientFail(TOKEN, { fn:job.fn, row_id:job.payload.row_id, verdict:job.payload.verdict, memo:job.payload.memo, reason:String(reason||'') });
      }
      try{ console.error('저장 실패→로그('+job.fn+' '+job.payload.row_id+'):', reason); }catch(x){}
      toast('실패! 실패 로그에 저장되었습니다. 다음 항목을 판별해 주세요.');
      dropJob_(job);
      if(!PENDING.length) setSaveBadge('저장 실패 — 로그 기록됨', true);
    }
    function flushPending(){
      if(FLUSHING || !PENDING.length) return;
      FLUSHING=true; var job=PENDING[0]; job.tries=(job.tries||0)+1;
      google.script.run
        .withSuccessHandler(function(){ doneJob_(job); })
        .withFailureHandler(function(e){
          var msg=(e&&e.message)?String(e.message):String(e);
          verifyJob_(job,
            function(){ doneJob_(job); },                          // 반영됨 → 성공
            function(){ reportFail_(job, msg||'확정 미저장'); },     // 확정 미저장 → 실패 보고+로그
            function(){                                             // 확인 불가 → 잠깐 재시도, 오래 안 되면 실패 처리
              if(job.tries>=4){ reportFail_(job, '응답/확인 실패: '+msg); }
              else { updateSaveBadge(); FLUSHING=false; setTimeout(flushPending, Math.min(job.tries*2500, 12000)); }
            }
          );
        })[job.fn](TOKEN, job.payload);

    function renderGuide(md){
      var lines=String(md||'').split(/\r?\n/), html='', bq=false, toc=[], hi=0, ulStack=[], tbl=null;
      function inl(s){ return esc(s).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank">$1</a>'); }
      function closeUl(){ while(ulStack.length){ html+='</ul>'; ulStack.pop(); } }
      function closeBq(){ if(bq){ html+='</blockquote>'; bq=false; } }
      function cellsOf(ln){ return ln.trim().replace(/^\|/,'').replace(/\|$/,'').split('|').map(function(x){ return x.trim(); }); }
      function flushTbl(){ if(!tbl) return; var t=tbl; tbl=null; if(!t.rows.length && !t.head) return;
        html+='<table class="gtbl">';
        if(t.head) html+='<thead><tr>'+t.head.map(function(c){ return '<th>'+inl(c)+'</th>'; }).join('')+'</tr></thead>';
        html+='<tbody>'+t.rows.map(function(r){ return '<tr>'+r.map(function(c){ return '<td>'+inl(c)+'</td>'; }).join('')+'</tr>'; }).join('')+'</tbody></table>'; }
      lines.forEach(function(ln){ var m;
        if(/^\s*\|.*\|\s*$/.test(ln)){
          var cs=cellsOf(ln);
          if(cs.length && cs.every(function(c){ return /^:?-{2,}:?$/.test(c); })){ if(tbl && tbl.rows.length && !tbl.head){ tbl.head=tbl.rows.pop(); } return; }
          if(!tbl){ closeUl(); closeBq(); tbl={rows:[],head:null}; }
          tbl.rows.push(cs); return;
        }
        flushTbl();
        if((m=ln.match(/^(#{1,6})\s+(.*)$/))){ closeUl(); closeBq(); var lv=m[1].length, id='g-h'+(hi++); if(lv<=3) toc.push({lv:lv,text:m[2],id:id}); html+='<h'+lv+' id="'+id+'">'+inl(m[2])+'</h'+lv+'>'; }
        else if(/^\s*---+\s*$/.test(ln)){ closeUl(); closeBq(); html+='<hr>'; }
        else if((m=ln.match(/^>\s?(.*)$/))){ closeUl(); if(!bq){ html+='<blockquote>'; bq=true; } if(m[1].trim()!=='') html+='<p>'+inl(m[1])+'</p>'; }
        else if((m=ln.match(/^(\s*)[-*]\s+(.*)$/))){ closeBq();
          var indent=m[1].replace(/\t/g,'  ').length;
          while(ulStack.length && ulStack[ulStack.length-1] > indent){ html+='</ul>'; ulStack.pop(); }
          if(!ulStack.length || ulStack[ulStack.length-1] < indent){ html+='<ul>'; ulStack.push(indent); }
          html+='<li>'+inl(m[2])+'</li>'; }
        else if(ln.trim()===''){ closeUl(); closeBq(); }
        else { closeUl(); closeBq(); html+='<p>'+inl(ln)+'</p>'; } });
      flushTbl(); closeUl(); closeBq();
      return {html:html, toc:toc};
    }
    function showGuide(md){
      var g=renderGuide(md);
      $('guideBody').innerHTML=g.html;
      $('guideToc').innerHTML = g.toc.length ? g.toc.map(function(t){ return '<a class="lv'+t.lv+'" href="#" onclick="return jumpGuide(\''+t.id+'\')">'+esc(t.text)+'</a>'; }).join('') : '<span class="kbd">목차 없음</span>';
    }
    function jumpGuide(id){ var el=document.getElementById(id); if(el) el.scrollIntoView({behavior:'smooth', block:'start'}); return false; }
    function closeGuide(){ $('guideModal').classList.add('hidden'); }
    $('guideModal').addEventListener('click', function(e){ if(e.target===this) closeGuide(); });
  </script>
</body>
</html>
